# Géneros Periodísticos (transversal a todas las jerarquías)
journalistic_genres:
  - id: "breaking_news"
    label: "Breaking News"
    definition: "Noticias con énfasis en la inmediatez y la urgencia. Eventos que están ocurriendo o acaban de suceder."
    indicators: ["urgente", "último momento", "en vivo", "ahora"]
  
  - id: "noticia"
    label: "Noticia"
    definition: "Informa sobre un hecho reciente y relevante de manera objetiva, concisa y directa."
    indicators: ["informar", "reportar", "anunciar"]
  
  - id: "opinion"
    label: "Opinión"
    definition: "Interpretación, juicio de valor o perspectiva personal del autor sobre un tema."
    indicators: ["columna", "editorial", "análisis", "perspectiva"]
  
  - id: "cronica"
    label: "Crónica"
    definition: "Relata un suceso en desarrollo o recién finalizado, combinando información y narración."
    indicators: ["relato", "testimonio", "reconstrucción"]
  
  - id: "entrevista"
    label: "Entrevista"
    definition: "Conversación con protagonistas para explorar personalidad, trayectoria o reflexiones."
    indicators: ["entrevista", "conversación", "diálogo"]
  
  - id: "investigacion"
    label: "Investigación"
    definition: "Explora un tema complejo en profundidad, con múltiples fuentes, datos y perspectivas."
    indicators: ["investigación", "revelación", "datos exclusivos", "fuentes múltiples"]

# Formatos (transversal)
content_formats:
  - id: "monoformato"
    label: "Monoformato"
    definition: "Contenido que se apoya en un solo formato dominante (texto o video)."
  
  - id: "multiformato"
    label: "Multiformato"
    definition: "Combina más de un formato de manera complementaria (texto + video + infografía)."
  
  - id: "interactivo"
    label: "Interactivo"
    definition: "Requiere participación activa del usuario (juegos, visualizaciones, calculadoras, test)."

# Temporalidad (transversal)
temporality:
  - id: "perecedero"
    label: "Perecedero"
    definition: "Contenido con vigencia limitada, pierde relevancia rápidamente."
    max_hours: 48
  
  - id: "no_perecedero"
    label: "No Perecedero"
    definition: "Contenido evergreen, mantiene relevancia en el tiempo."
    max_hours: 8760  # 1 año o más
