  - id: "trends"
    label: "Trends"
    definition: "Enfocado en temas, comportamientos o fenómenos emergentes que están ganando popularidad en un momento determinado."
    context: "Viralidad, conversación social, curiosidad o entretenimiento. El contenido es secundario al fenómeno de popularidad."
    note: "Trends puede contener dentro de su temática cualquier tipo de noticia, varía por el tipo de contenido o de intención. El foco está en la viralidad y popularidad emergente, no en la temática en sí."
    
    tematicas:
      - label: "Economía Trends"
        definition: "Temas económicos que están ganando popularidad o generando conversación social."
        subtematicas:
          - label: "Tendencias Económicas Virales"
            tags: ["economía viral", "finanzas trending", "inversiones populares", "cripto viral"]
      
      - label: "Política Trends"
        definition: "Temas políticos que están siendo tendencia en redes sociales o medios."
        subtematicas:
          - label: "Política Viral"
            tags: ["política trending", "viralización política", "debate público", "controversias"]
      
      - label: "Cultura y Espectáculos Trends"
        definition: "Fenómenos de entretenimiento que están en boca de todos."
        subtematicas:
          - label: "Entretenimiento Viral"
            tags: ["trending", "viral", "redes sociales", "memes", "fenómeno cultural", "challenge"]
      
      - label: "Lifestyle Trends"
        definition: "Tendencias de estilo de vida emergentes."
        subtematicas:
          - label: "Tendencias de Estilo de Vida"
            tags: ["lifestyle viral", "tendencias consumo", "fenómenos sociales", "hacks virales"]
      
      - label: "Sociedad Trends"
        definition: "Comportamientos o movimientos sociales emergentes."
        subtematicas:
          - label: "Fenómenos Sociales Emergentes"
            tags: ["sociedad trending", "comportamientos emergentes", "movimientos sociales", "causas virales"]

  - id: "no_news"
    label: "No News"
    definition: "Contenido adicional de La Nación que no son noticias."
